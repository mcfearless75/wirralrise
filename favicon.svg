<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="rounded">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>
  <!-- Navy background -->
  <rect width="32" height="32" rx="7" fill="#1a2e5c"/>
  <!-- Teal "rise" accent bar at bottom -->
  <rect y="25" width="32" height="7" fill="#3a9e6e" clip-path="url(#rounded)"/>
  <!-- WR initials -->
  <text
    x="16"
    y="22"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="800"
    font-size="13.5"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="0.5"
  >WR</text>
</svg>
